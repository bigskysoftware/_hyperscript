<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>_hyperscript scratch pad</title>
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/monokai.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/lint/lint.min.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
	<style>
		* { box-sizing: border-box; margin: 0; padding: 0; }
		body { font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #1e1e1e; color: #ccc; }
		header { padding: 8px 16px; background: #111; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
		header h1 { font-size: 14px; font-weight: 600; color: #fff; }
		header button { padding: 4px 12px; border: 1px solid #555; border-radius: 4px; background: #2a2a2a; color: #eee; cursor: pointer; font-size: 13px; }
		header button:hover { background: #3a3a3a; }
		.panes { flex: 1; display: flex; min-height: 0; }
		.editor-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; }
		.editor-pane .label { padding: 4px 12px; background: #252525; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #333; }
		.CodeMirror { flex: 1; height: auto; font-size: 14px; }
		.preview-pane { flex: 1; display: flex; flex-direction: column; }
		.preview-pane .label { padding: 4px 12px; background: #252525; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #888; border-bottom: 1px solid #333; }
		.preview-frame { flex: 1; background: #fff; border: none; }
		.status { padding: 4px 16px; background: #111; border-top: 1px solid #333; font-size: 12px; color: #888; display: flex; gap: 16px; }
		.status .error { color: #f44; }
		.status .error-list { flex: 1; }

		/* Lint gutter */
		.CodeMirror-lint-marker-error { color: #f44; }
		.CodeMirror-lint-tooltip { background: #333; border: 1px solid #555; color: #eee; }

		/* Hyperscript keyword highlighting inside _="" attributes */
		.cm-hs-keyword { color: #c792ea; }
		.cm-hs-symbol-global { color: #82aaff; }
		.cm-hs-symbol-element { color: #f78c6c; }
		.cm-hs-symbol-dom { color: #c3e88d; }
		.cm-hs-symbol-inherited-attr { color: #ffcb6b; }
		.cm-hs-string { color: #c3e88d; }
		.cm-hs-number { color: #f78c6c; }
		.cm-hs-operator { color: #89ddff; }
		.cm-hs-comment { color: #546e7a; font-style: italic; }
	</style>
</head>
<body>

<header>
	<h1>_hyperscript scratch pad</h1>
	<button id="run-btn">Run (Ctrl+Enter)</button>
	<button id="clear-btn">Clear Preview</button>
</header>

<div class="panes">
	<div class="editor-pane">
		<div class="label">HTML + _hyperscript</div>
		<textarea id="editor"></textarea>
	</div>
	<div class="preview-pane">
		<div class="label">Preview</div>
		<iframe id="preview" class="preview-frame"></iframe>
	</div>
</div>

<div class="status" id="status">Ready</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/mode/overlay.min.js"></script>
<!-- Load _hyperscript in the parent for parsing/linting -->
<script src="../dist/_hyperscript.js"></script>
<script>
// ============================================================
// Hyperscript-aware inner mode for _="" attribute values
// ============================================================

var HS_KEYWORDS = [
	"on", "init", "immediately", "end", "if", "else", "then", "set", "get",
	"put", "into", "before", "after", "add", "remove", "toggle", "trigger",
	"send", "take", "log", "call", "wait", "settle", "repeat", "for", "in",
	"while", "until", "from", "to", "by", "increment", "decrement", "default",
	"transition", "fetch", "throw", "return", "exit", "halt", "async", "tell",
	"go", "hide", "show", "with", "when", "changes", "live", "bind", "and",
	"or", "not", "no", "is", "am", "the", "a", "an", "of", "closest", "next",
	"previous", "first", "last", "random", "as", "my", "me", "it", "its",
	"you", "your", "yourself", "result", "event", "target", "detail", "sender",
	"body", "true", "false", "null", "undefined", "global", "element", "local",
	"dom", "live", "watch", "behavior", "install", "def", "js", "make",
	"measure", "append", "pick", "match", "eventsource", "socket",
];
var HS_KEYWORD_SET = new Set(HS_KEYWORDS);

CodeMirror.defineMode("hyperscript-inner", function () {
	return {
		startState: function () { return {}; },
		token: function (stream) {
			// Comments
			if (stream.match("--")) {
				stream.skipToEnd();
				return "hs-comment";
			}
			// Strings
			if (stream.match(/^'[^']*'/)) return "hs-string";
			if (stream.match(/^"[^"]*"/)) return "hs-string";
			// Inherited attribute: ^@name
			if (stream.match(/^\^@[a-zA-Z_][\w-]*/)) return "hs-symbol-inherited-attr";
			// DOM scoped: ^name
			if (stream.match(/^\^[a-zA-Z_]\w*/)) return "hs-symbol-dom";
			// Global: $name
			if (stream.match(/^\$[a-zA-Z_]\w*/)) return "hs-symbol-global";
			// Element scoped: :name
			if (stream.match(/^:[a-zA-Z_]\w*/)) return "hs-symbol-element";
			// Attribute ref: @name
			if (stream.match(/^@[a-zA-Z_][\w-]*/)) return "hs-operator";
			// Style ref: *name
			if (stream.match(/^\*[a-zA-Z_][\w-]*/)) return "hs-operator";
			// Class ref: .name
			if (stream.match(/^\.[a-zA-Z_][\w-]*/)) return "hs-operator";
			// ID ref: #name
			if (stream.match(/^#[a-zA-Z_][\w-]*/)) return "hs-operator";
			// Numbers
			if (stream.match(/^\d+(\.\d+)?/)) return "hs-number";
			// Operators
			if (stream.match(/^[+\-*\/%=<>!&|,;:(){}\[\]]/)) return "hs-operator";
			// Words
			if (stream.match(/^[a-zA-Z_]\w*/)) {
				var word = stream.current();
				if (HS_KEYWORD_SET.has(word)) return "hs-keyword";
				return null;
			}
			// Skip whitespace and unknown
			stream.next();
			return null;
		}
	};
});

// Overlay that activates hyperscript-inner inside _="" attribute values
CodeMirror.defineMode("html-hyperscript", function (config) {
	return CodeMirror.overlayMode(
		CodeMirror.getMode(config, "htmlmixed"),
		{
			token: function (stream, state) {
				// We can't easily detect attribute context in overlay mode,
				// so we highlight hyperscript tokens everywhere — they're
				// distinct enough (^var, $var, :var) to not cause false positives
				// in regular HTML.
				if (stream.match("--")) { stream.skipToEnd(); return "hs-comment"; }
				if (stream.match(/^\^@[a-zA-Z_][\w-]*/)) return "hs-symbol-inherited-attr";
				if (stream.match(/^\^[a-zA-Z_]\w*/)) return "hs-symbol-dom";
				if (stream.match(/^\$[a-zA-Z_]\w*/)) return "hs-symbol-global";
				if (stream.match(/^:[a-zA-Z_]\w*/)) return "hs-symbol-element";
				stream.next();
				return null;
			}
		}
	);
});

// ============================================================
// Linting: extract _="" values, parse with _hyperscript, report errors
// ============================================================

function lintHyperscript(text) {
	var errors = [];
	// Find all _="..." attributes with their positions
	var attrRegex = /_\s*=\s*"([^"]*)"/g;
	var match;
	var lines = text.split("\n");

	while ((match = attrRegex.exec(text)) !== null) {
		var hsSource = match[1];
		// Unescape HTML entities
		hsSource = hsSource.replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&amp;/g, "&").replace(/&quot;/g, '"');
		var attrStart = match.index + match[0].indexOf('"') + 1;

		// Find line/col of attribute value start
		var charCount = 0;
		var startLine = 0, startCol = 0;
		for (var i = 0; i < lines.length; i++) {
			if (charCount + lines[i].length >= attrStart) {
				startLine = i;
				startCol = attrStart - charCount;
				break;
			}
			charCount += lines[i].length + 1; // +1 for \n
		}

		try {
			_hyperscript.parse(hsSource);
		} catch (e) {
			var msg = e.message.split("\n")[0];
			errors.push({
				from: CodeMirror.Pos(startLine, startCol),
				to: CodeMirror.Pos(startLine, startCol + hsSource.length),
				message: msg,
				severity: "error"
			});
		}
	}
	return errors;
}

CodeMirror.registerHelper("lint", "html-hyperscript", lintHyperscript);

// ============================================================
// Autocomplete: hyperscript keywords inside _="" attributes
// ============================================================

function hsHint(cm) {
	var cursor = cm.getCursor();
	var line = cm.getLine(cursor.line);
	var end = cursor.ch;
	var start = end;
	while (start > 0 && /[\w$:^@]/.test(line.charAt(start - 1))) start--;
	var word = line.slice(start, end).toLowerCase();

	// Check if we're plausibly inside a _="" attribute
	var before = line.slice(0, start);
	if (!/_\s*=\s*"/.test(before) && !/_\s*=\s*'/.test(before)) return null;

	var completions = HS_KEYWORDS.filter(function (kw) {
		return kw.startsWith(word) && kw !== word;
	});
	if (completions.length === 0) return null;

	return {
		list: completions,
		from: CodeMirror.Pos(cursor.line, start),
		to: CodeMirror.Pos(cursor.line, end)
	};
}

CodeMirror.registerHelper("hint", "html-hyperscript", hsHint);

// ============================================================
// Editor setup
// ============================================================

var DEFAULT_HTML = '<style>\n\
  body { font-family: system-ui, sans-serif; padding: 20px; }\n\
  button { padding: 8px 16px; margin: 4px; cursor: pointer; }\n\
  output, .result { display: block; margin: 8px 0; padding: 8px; background: #f0f0f0; border-radius: 4px; min-height: 1.5em; }\n\
</style>\n\
\n\
<h2>Counter</h2>\n\
<div _="init set ^count to 0">\n\
  <button _="on click increment ^count">+1</button>\n\
  <button _="on click decrement ^count">-1</button>\n\
  <input _="bind ^count" />\n\
</div>\n';

var cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
	mode: 'html-hyperscript',
	theme: 'monokai',
	lineNumbers: true,
	tabSize: 2,
	indentWithTabs: true,
	lineWrapping: true,
	autoCloseTags: true,
	matchBrackets: true,
	gutters: ["CodeMirror-lint-markers"],
	lint: { getAnnotations: lintHyperscript, async: false },
	extraKeys: {
		'Ctrl-Enter': run,
		'Cmd-Enter': run,
		'Ctrl-Space': function (cm) { cm.showHint({ hint: hsHint }); },
	}
});

cm.setValue(DEFAULT_HTML);

// ============================================================
// Preview
// ============================================================

var scriptPath = new URL('../dist/_hyperscript.js', window.location.href).href;
var lastErrors = [];

function run() {
	var html = cm.getValue();
	var iframe = document.getElementById('preview');
	var status = document.getElementById('status');
	lastErrors = [];

	var doc = iframe.contentDocument;
	doc.open();
	doc.write(
		'<!doctype html><html><head><meta charset="utf-8">' +
		'<script src="' + scriptPath + '"><\/script>' +
		'<script>\n' +
		'window.addEventListener("error", function(e) { parent._scratchError(e.message); });\n' +
		'var _origConsoleError = console.error;\n' +
		'console.error = function() {\n' +
		'  var msg = Array.from(arguments).map(function(a) { return typeof a === "string" ? a : ""; }).join(" ");\n' +
		'  if (msg) parent._scratchError(msg);\n' +
		'  _origConsoleError.apply(console, arguments);\n' +
		'};\n' +
		'<\/script>' +
		'</head><body>' +
		html +
		'</body></html>'
	);
	doc.close();

	setTimeout(function () {
		if (lastErrors.length > 0) {
			status.innerHTML = '<span class="error">' + lastErrors.length + ' error(s)</span> ' +
				'<span class="error-list">' + lastErrors.map(function(e) {
					return e.split("\n")[0];
				}).join(" | ") + '</span>';
		} else {
			status.innerHTML = 'Updated <span style="color:#888">(' + new Date().toLocaleTimeString() + ')</span>';
		}
	}, 200);
}

// Error collector called from iframe
window._scratchError = function (msg) {
	lastErrors.push(msg);
};

document.getElementById('run-btn').addEventListener('click', run);
document.getElementById('clear-btn').addEventListener('click', function () {
	var doc = document.getElementById('preview').contentDocument;
	doc.open();
	doc.write('<!doctype html><html><head></head><body></body></html>');
	doc.close();
	document.getElementById('status').textContent = 'Cleared';
});

// Initial run
setTimeout(run, 100);
</script>

</body>
</html>
