---
layout: layout.njk
title: Try it! - ///_hyperscript
---

<style>
    /* Override container for full-bleed playground */
    .container.content { max-width: none; padding: 0; }

    .playground { display: flex; flex-direction: column; height: calc(100dvh - 52px); overflow: hidden; }

    .playground-toolbar {
        background: var(--chrome-gradient);
        padding: 4px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .playground-toolbar h2 {
        font-size: 0.85rem;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .playground-toolbar h2::before {
        content: '';
        display: inline-block;
        width: 14px;
        height: 11px;
        flex-shrink: 0;
        opacity: 0.35;
        background: repeating-linear-gradient(to bottom, var(--text) 0px, var(--text) 1px, transparent 1px, transparent 3px);
    }
    .toolbar-spacer { flex: 1; }
    .toolbar-select {
        font-family: var(--font-heading);
        font-size: 0.82rem;
        padding: 2px 6px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: white;
    }

    .playground-panes { flex: 1; display: flex; min-height: 0; }
    .pane-editor { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .pane-preview { flex: 1; display: flex; flex-direction: column; min-height: 0; }
    .pane-label {
        padding: 3px 10px;
        background: var(--bg-chrome);
        font-family: var(--font-heading);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .preview-frame { flex: 1; background: white; border: none; min-height: 0; }
    .pane-editor { background: #1e2228; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .pane-editor .pane-label { background: #282e36; color: #e2e8f0; border-color: #3b4252; }
    .CodeMirror { flex: 1; height: auto; font-size: 14px; font-family: var(--mono-font); font-weight: bold; }
    /* Custom CodeMirror theme */
    .cm-s-hyperscript.CodeMirror { background: #1e2228; color: #e2e8f0; }
    .cm-s-hyperscript .CodeMirror-gutters { background: #1e2228; border-right: 1px solid #2e3440; }
    .cm-s-hyperscript .CodeMirror-linenumber { color: #4a5568; }
    .cm-s-hyperscript .CodeMirror-cursor { border-left: 1px solid #e2e8f0; }
    .cm-s-hyperscript .CodeMirror-selected { background: #2e3a4e; }
    .cm-s-hyperscript .CodeMirror-activeline-background { background: #252b33; }
    .cm-s-hyperscript .CodeMirror-matchingbracket { color: #f0d26e !important; text-decoration: underline; }
    .cm-s-hyperscript span.cm-tag { color: #d2a0e0; }
    .cm-s-hyperscript span.cm-bracket { color: #e2e8f0; }
    .cm-s-hyperscript span.cm-attribute { color: #6cb6ff; }
    .cm-s-hyperscript span.cm-string { color: #7ec699; }
    .cm-s-hyperscript span.cm-string-2 { color: #7ec699; }
    .cm-s-hyperscript span.cm-keyword { color: #6cb6ff; font-weight: bold; }
    .cm-s-hyperscript span.cm-number { color: #e6994a; }
    .cm-s-hyperscript span.cm-comment { color: #5a6578; font-style: italic; }
    .cm-s-hyperscript span.cm-def { color: #5bc4e0; }
    .cm-s-hyperscript span.cm-variable { color: #e2e8f0; }
    .cm-s-hyperscript span.cm-variable-2 { color: #e2e8f0; }
    .cm-s-hyperscript span.cm-property { color: #e2e8f0; }
    .cm-s-hyperscript span.cm-operator { color: #c0cfe0; }
    .cm-s-hyperscript span.cm-atom { color: #e6994a; }
    .cm-s-hyperscript span.cm-meta { color: #5bc4e0; }
    .cm-s-hyperscript span.cm-builtin { color: #f0d26e; }

    .playground-status {
        padding: 3px 12px;
        background: var(--bg-chrome);
        border-top: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--text-muted);
        flex-shrink: 0;
    }
    .playground-status .error { color: #c00; }

    /* Hyperscript overlay tokens — must beat cm-string when both apply */
    .cm-hs-keyword { color: #6cb6ff !important; font-weight: bold; }
    .cm-hs-symbol-global { color: #5bc4e0 !important; }
    .cm-hs-symbol-element { color: #e6994a !important; }
    .cm-hs-symbol-dom { color: #7ec699 !important; }
    .cm-hs-symbol-inherited-attr { color: #f0d26e !important; }
    .cm-hs-comment { color: #5a6578 !important; font-style: italic; }

    /* Console */
    .pane-console {
        display: flex;
        flex-direction: column;
        flex: 0 1 180px;
        min-height: 80px;
        background: #1e2228;
        border-top: 1px solid #3b4252;
    }
    .pane-console .pane-label { background: #282e36; color: #e2e8f0; border-color: #3b4252; }
    .pane-console { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    .console-output {
        flex: 1;
        overflow-y: auto;
        padding: 6px 10px;
        font-family: var(--mono-font);
        font-size: 12px;
        font-weight: bold;
        color: #e2e8f0;
        background: #252b33;
    }
    .console-output .log { color: #e2e8f0; }
    .console-output .warn { color: #f0d26e; }
    .console-output .error { color: #e05555; }
    .console-output .result { color: #5bc4e0; }
    .console-output .separator { color: #3b4252; border-top: 1px solid #2e3440; margin: 4px 0; }
    .console-output div { padding: 1px 0; white-space: pre-wrap; word-break: break-all; }
    .console-input-line {
        display: flex;
        align-items: center;
        border-top: 1px solid #3b4252;
        padding: 4px 10px;
        background: #1e2228;
        flex-shrink: 0;
    }
    .console-prompt {
        color: #5bc4e0;
        font-family: var(--mono-font);
        font-size: 13px;
        margin-right: 6px;
        user-select: none;
    }
    textarea.console-input, textarea.console-input:focus {
        flex: 1;
        background: transparent;
        border: none;
        outline: none;
        box-shadow: none;
        color: #e2e8f0;
        font-family: var(--mono-font);
        font-size: 12px;
        font-weight: bold;
        padding: 0;
        margin: 0;
        border-radius: 0;
        resize: none;
        overflow: hidden;
        line-height: 1.5;
        height: 18px;
    }
    .console-input::placeholder { color: #5a6578; }

    /* Resize handles */
    .resize-handle-h {
        width: 5px;
        cursor: col-resize;
        background: #2e3440;
        flex-shrink: 0;
        transition: background 0.15s;
    }
    .resize-handle-h:hover,
    .resize-handle-h.dragging { background: #5bc4e0; }

    .resize-handle-v {
        height: 5px;
        cursor: row-resize;
        background: #2e3440;
        flex-shrink: 0;
        transition: background 0.15s;
    }
    .resize-handle-v:hover,
    .resize-handle-v.dragging { background: #5bc4e0; }

    @media (max-width: 768px) {
        .playground-panes { flex-direction: column; }
        .pane-editor { border-right: none; border-bottom: 1px solid var(--border); max-height: 50%; }
        .resize-handle-h { display: none; }
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">

<script>
// ============================================================
// Built-in examples
// ============================================================
var BUILTIN_EXAMPLES = {
    counter: '<h2>Counter</h2>\n<div _="init set ^count to 0">\n  <button _="on click increment ^count">+1</button>\n  <button _="on click decrement ^count">-1</button>\n  <input _="bind ^count to me" />\n</div>',
    colors: '<h2>Color Cycle</h2>\n<button style="padding:12px 24px;font-size:1.1rem;cursor:pointer"\n        _="on pointerdown\n             repeat until event pointerup from document\n               set rand to Math.random() * 360\n               transition #color-target\'s *background-color\n                 to `hsl(${rand} 100% 85%)` over 200ms\n             end\n             transition #color-target\'s *background-color to initial">\n  Press and hold\n</button>\n<div id="color-target" style="margin-top:1em;padding:2em;border:1px solid #ddd;border-radius:4px;text-align:center">Watch me change!</div>',
    search: '<h2>Live Search</h2>\n<input type="text" placeholder="Search..."\n       _="on input\n            show &lt;li/&gt; in #results\n              when its textContent contains my value" />\n<ul id="results">\n  <li>Apples</li>\n  <li>Bananas</li>\n  <li>Cherries</li>\n  <li>Dates</li>\n  <li>Elderberries</li>\n  <li>Figs</li>\n  <li>Grapes</li>\n</ul>',
};

// ============================================================
// Hyperscript overlay mode for CodeMirror
// ============================================================
var HS_KEYWORDS = [
    "on", "init", "immediately", "end", "if", "else", "then", "set", "get",
    "put", "into", "before", "after", "add", "remove", "toggle", "trigger",
    "send", "take", "log", "call", "wait", "settle", "repeat", "for", "in",
    "while", "until", "from", "to", "by", "increment", "decrement", "default",
    "transition", "fetch", "throw", "return", "exit", "halt", "async", "tell",
    "go", "hide", "show", "with", "when", "changes", "live", "bind", "and",
    "or", "not", "no", "is", "am", "the", "a", "an", "of", "closest", "next",
    "previous", "first", "last", "random", "as", "my", "me", "it", "its",
    "you", "your", "yourself", "result", "event", "target", "detail", "sender",
    "body", "true", "false", "null", "undefined", "global", "element", "local",
    "dom", "live", "watch", "behavior", "install", "def", "js", "make",
    "measure", "append", "pick", "match", "eventsource", "socket",
];
var HS_KEYWORD_SET = new Set(HS_KEYWORDS);

CodeMirror.defineMode("html-hyperscript", function (config) {
    return CodeMirror.overlayMode(
        CodeMirror.getMode(config, "htmlmixed"),
        {
            token: function (stream) {
                if (stream.match("--")) { stream.skipToEnd(); return "hs-comment"; }
                if (stream.match(/^\^@[a-zA-Z_][\w-]*/)) return "hs-symbol-inherited-attr";
                if (stream.match(/^\^[a-zA-Z_]\w*/)) return "hs-symbol-dom";
                if (stream.match(/^\$[a-zA-Z_]\w*/)) return "hs-symbol-global";
                if (stream.match(/^:[a-zA-Z_]\w*/)) return "hs-symbol-element";
                if (stream.match(/^[a-zA-Z_]\w*/)) {
                    var word = stream.current();
                    if (HS_KEYWORD_SET.has(word)) return "hs-keyword";
                    return null;
                }
                if (stream.match(/^#[a-zA-Z_][\w-]*/)) return "hs-symbol-element";
                if (stream.match(/^\.[a-zA-Z_][\w-]*/)) return "hs-symbol-dom";
                stream.next();
                return null;
            }
        }
    );
});

// ============================================================
// Linting
// ============================================================
function lintHyperscript(text) {
    var errors = [];
    var attrRegex = /_\s*=\s*"([^"]*)"/g;
    var match;
    var lines = text.split("\n");

    // Build list of template tag ranges to skip
    var templateRanges = [];
    var tmplRegex = /<template[\s>]/gi;
    var tmplMatch;
    while ((tmplMatch = tmplRegex.exec(text)) !== null) {
        var closeIdx = text.indexOf('</template>', tmplMatch.index);
        if (closeIdx !== -1) {
            templateRanges.push([tmplMatch.index, closeIdx + '</template>'.length]);
        }
    }

    while ((match = attrRegex.exec(text)) !== null) {
        // Skip _ attributes inside <template> tags
        var inTemplate = templateRanges.some(function (r) {
            return match.index >= r[0] && match.index < r[1];
        });
        if (inTemplate) continue;

        var hsSource = match[1];
        hsSource = hsSource.replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&amp;/g, "&").replace(/&quot;/g, '"');
        var attrStart = match.index + match[0].indexOf('"') + 1;

        var charCount = 0;
        var startLine = 0, startCol = 0;
        for (var i = 0; i < lines.length; i++) {
            if (charCount + lines[i].length >= attrStart) {
                startLine = i;
                startCol = attrStart - charCount;
                break;
            }
            charCount += lines[i].length + 1;
        }

        try {
            _hyperscript.parse(hsSource);
        } catch (e) {
            var msg = e.message.split("\n")[0];
            errors.push({
                from: CodeMirror.Pos(startLine, startCol),
                to: CodeMirror.Pos(startLine, startCol + hsSource.length),
                message: msg,
                severity: "error"
            });
        }
    }
    return errors;
}

CodeMirror.registerHelper("lint", "html-hyperscript", lintHyperscript);

// ============================================================
// Autocomplete
// ============================================================
function hsHint(cm) {
    var cursor = cm.getCursor();
    var line = cm.getLine(cursor.line);
    var end = cursor.ch;
    var start = end;
    while (start > 0 && /[\w$:^@]/.test(line.charAt(start - 1))) start--;
    var word = line.slice(start, end).toLowerCase();

    var before = line.slice(0, start);
    if (!/_\s*=\s*"/.test(before) && !/_\s*=\s*'/.test(before)) return null;

    var completions = HS_KEYWORDS.filter(function (kw) {
        return kw.startsWith(word) && kw !== word;
    });
    if (completions.length === 0) return null;

    return {
        list: completions,
        from: CodeMirror.Pos(cursor.line, start),
        to: CodeMirror.Pos(cursor.line, end)
    };
}

CodeMirror.registerHelper("hint", "html-hyperscript", hsHint);

// ============================================================
// Editor
// ============================================================
var cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'html-hyperscript',
    theme: 'hyperscript',
    lineNumbers: true,
    tabSize: 2,
    indentWithTabs: false,
    lineWrapping: true,
    matchBrackets: true,
    gutters: ["CodeMirror-lint-markers"],
    lint: { getAnnotations: lintHyperscript, async: false },
    extraKeys: {
        'Ctrl-Enter': run,
        'Cmd-Enter': run,
        'Ctrl-Space': function (cm) { cm.showHint({ hint: hsHint }); },
    }
});

// ============================================================
// Load initial content: ?src= (LZ compressed) or default
// ============================================================
var params = new URLSearchParams(window.location.search);
var sharedSrc = params.get('src');
var snippet = localStorage.getItem('playground-snippet');
if (sharedSrc) {
    try {
        cm.setValue(LZString.decompressFromEncodedURIComponent(sharedSrc));
    } catch (e) {
        cm.setValue(BUILTIN_EXAMPLES.counter);
    }
} else if (snippet) {
    localStorage.removeItem('playground-snippet');
    cm.setValue(snippet);
} else {
    cm.setValue(BUILTIN_EXAMPLES.counter);
}

// ============================================================
// Preview
// ============================================================
var scriptPath = '/js/_hyperscript.min.js';
var lastErrors = [];

function run() {
    var html = cm.getValue();
    var iframe = document.getElementById('preview');
    lastErrors = [];
    replLocals = {};
    consoleAppend('separator', '');

    var doc = iframe.contentDocument;
    doc.open();
    doc.write(
        '<!doctype html><html><head><meta charset="utf-8">' +
        '<style>body{font-family:"IBM Plex Sans",-apple-system,system-ui,sans-serif;padding:16px;font-size:15px;}button{cursor:pointer;}</style>' +
        '<script src="' + scriptPath + '"><\/script>' +
        '<script>\n' +
        'window.addEventListener("error", function(e) { parent._playgroundError(e.message); });\n' +
        'var _origLog = console.log;\n' +
        'console.log = function() {\n' +
        '  var msg = Array.from(arguments).map(function(a) { try { return typeof a === "object" ? JSON.stringify(a) : String(a); } catch(e) { return String(a); } }).join(" ");\n' +
        '  parent._playgroundConsole("log", msg);\n' +
        '  _origLog.apply(console, arguments);\n' +
        '};\n' +
        'var _origWarn = console.warn;\n' +
        'console.warn = function() {\n' +
        '  var msg = Array.from(arguments).map(function(a) { return String(a); }).join(" ");\n' +
        '  parent._playgroundConsole("warn", msg);\n' +
        '  _origWarn.apply(console, arguments);\n' +
        '};\n' +
        'var _origErr = console.error;\n' +
        'var _inError = false;\n' +
        'console.error = function() {\n' +
        '  if (_inError) return;\n' +
        '  _inError = true;\n' +
        '  var msg = Array.from(arguments).map(function(a) { return typeof a === "string" ? a : ""; }).join(" ");\n' +
        '  if (msg) parent._playgroundError(msg);\n' +
        '  _origErr.apply(console, arguments);\n' +
        '  _inError = false;\n' +
        '};\n' +
        '<\/script>' +
        '</head><body>' +
        html +
        '</body></html>'
    );
    doc.close();

    setTimeout(function () {
        var status = document.getElementById('status');
        if (lastErrors.length > 0) {
            status.innerHTML = '<span class="error">' + lastErrors.length + ' error(s)</span>';
        } else {
            status.innerHTML = 'Updated <span style="opacity:0.5">(' + new Date().toLocaleTimeString() + ')</span>';
        }
    }, 200);
}

window._playgroundError = function (msg) {
    lastErrors.push(msg);
    consoleAppend('error', msg);
};

window._playgroundConsole = function (level, msg) {
    consoleAppend(level, msg);
};

// ============================================================
// Console
// ============================================================
var consoleOutput = document.getElementById('console-output');
var consoleInput = document.getElementById('console-input');
var consoleHistory = [];
var historyIndex = -1;
var replLocals = {};

var BLOCK_OPENERS = /(?<!\^[\w$]+\s)\b(if|repeat|on|def|behavior|init|tell|for)\b/g;
var BLOCK_CLOSERS = /\bend\b/g;

function needsMoreInput(src) {
    var opens = (src.match(BLOCK_OPENERS) || []).length;
    var closes = (src.match(BLOCK_CLOSERS) || []).length;
    return opens > closes;
}

function consoleAppend(cls, text) {
    var el = document.createElement('div');
    el.className = cls;
    if (cls === 'separator') {
        el.innerHTML = '&nbsp;';
    } else {
        el.textContent = text;
    }
    consoleOutput.appendChild(el);
    consoleOutput.scrollTop = consoleOutput.scrollHeight;
}

function consoleEval(input) {
    var lines = input.split('\n');
    consoleAppend('log', '> ' + lines[0]);
    for (var i = 1; i < lines.length; i++) {
        consoleAppend('log', '... ' + lines[i]);
    }
    var iframe = document.getElementById('preview');
    var hs = iframe.contentWindow && iframe.contentWindow._hyperscript;
    if (!hs) {
        consoleAppend('error', 'No preview running — press Run first');
        return;
    }
    try {
        var result = hs(input, { locals: replLocals });
        if (result !== undefined) {
            var display;
            try { display = typeof result === 'object' ? JSON.stringify(result) : String(result); }
            catch (e) { display = String(result); }
            consoleAppend('result', display);
        }
    } catch (e) {
        consoleAppend('error', e.message ? e.message.split('\n')[0] : String(e));
    }
}

function autoSizeInput() {
    consoleInput.style.height = '18px';
    consoleInput.style.height = consoleInput.scrollHeight + 'px';
}

consoleInput.addEventListener('input', autoSizeInput);

consoleInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
        var src = this.value.trim();
        if (!src) return;
        if (needsMoreInput(src) && !e.shiftKey) {
            // Block incomplete — insert newline naturally
            return;
        }
        if (!needsMoreInput(src)) {
            // Complete — submit
            e.preventDefault();
            var input = this.value;
            this.value = '';
            autoSizeInput();
            consoleHistory.push(input);
            historyIndex = consoleHistory.length;
            consoleEval(input);
        }
        // Shift+Enter always inserts newline (default behavior)
    } else if (e.key === 'ArrowUp' && this.selectionStart === 0 && !this.value.includes('\n')) {
        e.preventDefault();
        if (historyIndex > 0) {
            historyIndex--;
            this.value = consoleHistory[historyIndex];
            autoSizeInput();
        }
    } else if (e.key === 'ArrowDown' && this.selectionStart === this.value.length && !this.value.includes('\n')) {
        e.preventDefault();
        if (historyIndex < consoleHistory.length - 1) {
            historyIndex++;
            this.value = consoleHistory[historyIndex];
            autoSizeInput();
        } else {
            historyIndex = consoleHistory.length;
            this.value = '';
            autoSizeInput();
        }
    }
});

// ============================================================
// Controls
// ============================================================
document.getElementById('run-btn').addEventListener('click', run);

document.getElementById('clear-btn').addEventListener('click', function () {
    cm.setValue('');
    var doc = document.getElementById('preview').contentDocument;
    doc.open();
    doc.write('<!doctype html><html><body></body></html>');
    doc.close();
    consoleOutput.innerHTML = '';
    document.getElementById('status').textContent = 'Cleared';
});

document.getElementById('share-btn').addEventListener('click', function () {
    var btn = this;
    var compressed = LZString.compressToEncodedURIComponent(cm.getValue());
    var url = window.location.origin + window.location.pathname + '?src=' + compressed;
    navigator.clipboard.writeText(url).then(function () {
        showToast('Share URL copied!', btn);
    });
});

function showToast(msg, anchor) {
    var existing = document.querySelector('.toast');
    if (existing) existing.remove();
    anchor.style.position = 'relative';
    var toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = msg;
    anchor.appendChild(toast);
    requestAnimationFrame(function () { toast.classList.add('show'); });
    setTimeout(function () {
        toast.classList.remove('show');
        toast.addEventListener('transitionend', function () { toast.remove(); });
    }, 1500);
}

document.getElementById('examples').addEventListener('change', function () {
    var val = this.value;
    if (!val) return;
    this.value = '';

    if (BUILTIN_EXAMPLES[val]) {
        cm.setValue(BUILTIN_EXAMPLES[val]);
        run();
        return;
    }

    // Fetch from /playground/ directory
    fetch('/playground/' + val)
        .then(function (r) { return r.text(); })
        .then(function (text) {
            cm.setValue(text);
            run();
        })
        .catch(function () {
            document.getElementById('status').innerHTML = '<span class="error">Failed to load example</span>';
        });
});

// ============================================================
// Resizable panes
// ============================================================
(function () {
    var resizeH = document.getElementById('resize-h');
    var resizeV = document.getElementById('resize-v');
    var panes = document.querySelector('.playground-panes');
    var editor = document.querySelector('.pane-editor');
    var preview = document.querySelector('.pane-preview');
    var previewFrame = document.getElementById('preview');
    var consolePane = document.querySelector('.pane-console');

    function startDrag(handle, onMove, onEnd) {
        handle.classList.add('dragging');
        // Cover iframe to prevent it from eating pointer events
        previewFrame.style.pointerEvents = 'none';
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', function up() {
            handle.classList.remove('dragging');
            previewFrame.style.pointerEvents = '';
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', up);
            if (onEnd) onEnd();
        });
    }

    // Horizontal: editor | preview
    resizeH.addEventListener('mousedown', function (e) {
        e.preventDefault();
        var panesRect = panes.getBoundingClientRect();
        startDrag(resizeH, function (e) {
            var x = e.clientX - panesRect.left;
            var pct = (x / panesRect.width) * 100;
            pct = Math.max(15, Math.min(85, pct));
            editor.style.flex = 'none';
            editor.style.width = pct + '%';
            preview.style.flex = '1';
        }, function () {
            cm.refresh();
        });
    });

    // Vertical: preview iframe | console
    resizeV.addEventListener('mousedown', function (e) {
        e.preventDefault();
        var previewRect = preview.getBoundingClientRect();
        startDrag(resizeV, function (e) {
            var y = e.clientY - previewRect.top;
            // Subtract the pane-label height (~24px)
            var available = previewRect.height - 24;
            var framePct = ((y - 24) / available) * 100;
            framePct = Math.max(10, Math.min(90, framePct));
            previewFrame.style.flex = 'none';
            previewFrame.style.height = framePct + '%';
            consolePane.style.flex = '1';
        });
    });
})();

// Initial run
setTimeout(run, 100);
</script>
