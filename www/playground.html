<style>
    /* Override container for full-bleed playground */
    .container.content { max-width: none; padding: 0; }

    .playground { display: flex; flex-direction: column; height: calc(100vh - 52px); }

    .playground-toolbar {
        background: var(--chrome-gradient);
        padding: 4px 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .playground-toolbar h2 {
        font-size: 0.85rem;
        margin: 0;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .playground-toolbar h2::before {
        content: '';
        display: inline-block;
        width: 14px;
        height: 11px;
        flex-shrink: 0;
        opacity: 0.35;
        background: repeating-linear-gradient(to bottom, var(--text) 0px, var(--text) 1px, transparent 1px, transparent 3px);
    }
    .toolbar-spacer { flex: 1; }
    .toolbar-select {
        font-family: var(--font-heading);
        font-size: 0.82rem;
        padding: 2px 6px;
        border: 1px solid var(--border-strong);
        border-radius: var(--radius);
        background: white;
    }

    .playground-panes { flex: 1; display: flex; min-height: 0; }
    .pane-editor { flex: 1; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
    .pane-preview { flex: 1; display: flex; flex-direction: column; }
    .pane-label {
        padding: 3px 10px;
        background: var(--bg-chrome);
        font-family: var(--font-heading);
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--text-muted);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
    }
    .preview-frame { flex: 1; background: white; border: none; }
    .CodeMirror { flex: 1; height: auto; font-size: 13px; font-family: var(--mono-font); }

    .playground-status {
        padding: 3px 12px;
        background: var(--bg-chrome);
        border-top: 1px solid var(--border);
        font-size: 0.75rem;
        color: var(--text-muted);
        flex-shrink: 0;
    }
    .playground-status .error { color: #c00; }

    /* Light-themed hyperscript tokens */
    .cm-hs-keyword { color: #7b3fa0; }
    .cm-hs-symbol-global { color: #3465a4; }
    .cm-hs-symbol-element { color: #b35c00; }
    .cm-hs-symbol-dom { color: #2e7d32; }
    .cm-hs-symbol-inherited-attr { color: #8a6d00; }
    .cm-hs-string { color: #c62828; }
    .cm-hs-number { color: #b35c00; }
    .cm-hs-operator { color: #555; }
    .cm-hs-comment { color: #7a7a7a; font-style: italic; }

    @media (max-width: 768px) {
        .playground-panes { flex-direction: column; }
        .pane-editor { border-right: none; border-bottom: 1px solid var(--border); max-height: 50%; }
    }
</style>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/lint/lint.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">

<div class="playground">
    <div class="playground-toolbar">
        <h2>Playground</h2>
        <div class="toolbar-spacer"></div>
        <select id="examples" class="toolbar-select">
            <option value="">Load example...</option>
            <option value="counter">Counter</option>
            <option value="hide_remove">Hide &amp; Remove</option>
            <option value="drag">Drag &amp; Drop</option>
            <option value="modal">Modal Dialog</option>
            <option value="goto">Go To Buttons</option>
            <option value="input_mirroring">Input Mirroring</option>
            <option value="password_visibility">Password Toggle</option>
            <option value="colors">Color Cycle</option>
            <option value="search">Live Search</option>
        </select>
        <button class="btn btn-sm" id="run-btn">Run (Ctrl+Enter)</button>
        <button class="btn btn-sm" id="share-btn">Share</button>
        <button class="btn btn-sm" id="clear-btn">Clear</button>
    </div>

    <div class="playground-panes">
        <div class="pane-editor">
            <div class="pane-label">Editor</div>
            <textarea id="editor"></textarea>
        </div>
        <div class="pane-preview">
            <div class="pane-label">Preview</div>
            <iframe id="preview" class="preview-frame"></iframe>
        </div>
    </div>

    <div class="playground-status" id="status">Ready &mdash; Ctrl+Enter to run, Ctrl+Space for autocomplete</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/lint/lint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/mode/overlay.min.js"></script>

<script>
// ============================================================
// Built-in examples
// ============================================================
var BUILTIN_EXAMPLES = {
    counter: '<h2>Counter</h2>\n<div _="init set ^count to 0">\n  <button _="on click increment ^count">+1</button>\n  <button _="on click decrement ^count">-1</button>\n  <input _="bind ^count" />\n</div>',
    colors: '<h2>Color Cycle</h2>\n<button style="padding:12px 24px;font-size:1.1rem;cursor:pointer"\n        _="on pointerdown\n             repeat until event pointerup from document\n               set rand to Math.random() * 360\n               transition *background-color of #color-target\n                 to `hsl($rand 100% 85%)` over 200ms\n             end\n             transition *background-color of #color-target to initial">\n  Press and hold\n</button>\n<div id="color-target" style="margin-top:1em;padding:2em;border:1px solid #ddd;border-radius:4px;text-align:center">Watch me change!</div>',
    search: '<h2>Live Search</h2>\n<input type="text" placeholder="Search..."\n       _="on input\n            show &lt;li/&gt; in #results\n              when its textContent contains my value" />\n<ul id="results">\n  <li>Apples</li>\n  <li>Bananas</li>\n  <li>Cherries</li>\n  <li>Dates</li>\n  <li>Elderberries</li>\n  <li>Figs</li>\n  <li>Grapes</li>\n</ul>',
};

// ============================================================
// Hyperscript overlay mode for CodeMirror
// ============================================================
var HS_KEYWORDS = [
    "on", "init", "immediately", "end", "if", "else", "then", "set", "get",
    "put", "into", "before", "after", "add", "remove", "toggle", "trigger",
    "send", "take", "log", "call", "wait", "settle", "repeat", "for", "in",
    "while", "until", "from", "to", "by", "increment", "decrement", "default",
    "transition", "fetch", "throw", "return", "exit", "halt", "async", "tell",
    "go", "hide", "show", "with", "when", "changes", "always", "bind", "and",
    "or", "not", "no", "is", "am", "the", "a", "an", "of", "closest", "next",
    "previous", "first", "last", "random", "as", "my", "me", "it", "its",
    "you", "your", "yourself", "result", "event", "target", "detail", "sender",
    "body", "true", "false", "null", "undefined", "global", "element", "local",
    "dom", "live", "watch", "behavior", "install", "def", "js", "make",
    "measure", "append", "pick", "match", "eventsource", "socket",
];
var HS_KEYWORD_SET = new Set(HS_KEYWORDS);

CodeMirror.defineMode("html-hyperscript", function (config) {
    return CodeMirror.overlayMode(
        CodeMirror.getMode(config, "htmlmixed"),
        {
            token: function (stream) {
                if (stream.match("--")) { stream.skipToEnd(); return "hs-comment"; }
                if (stream.match(/^\^@[a-zA-Z_][\w-]*/)) return "hs-symbol-inherited-attr";
                if (stream.match(/^\^[a-zA-Z_]\w*/)) return "hs-symbol-dom";
                if (stream.match(/^\$[a-zA-Z_]\w*/)) return "hs-symbol-global";
                if (stream.match(/^:[a-zA-Z_]\w*/)) return "hs-symbol-element";
                stream.next();
                return null;
            }
        }
    );
});

// ============================================================
// Linting
// ============================================================
function lintHyperscript(text) {
    var errors = [];
    var attrRegex = /_\s*=\s*"([^"]*)"/g;
    var match;
    var lines = text.split("\n");

    while ((match = attrRegex.exec(text)) !== null) {
        var hsSource = match[1];
        hsSource = hsSource.replace(/&lt;/g, "<").replace(/&gt;/g, ">").replace(/&amp;/g, "&").replace(/&quot;/g, '"');
        var attrStart = match.index + match[0].indexOf('"') + 1;

        var charCount = 0;
        var startLine = 0, startCol = 0;
        for (var i = 0; i < lines.length; i++) {
            if (charCount + lines[i].length >= attrStart) {
                startLine = i;
                startCol = attrStart - charCount;
                break;
            }
            charCount += lines[i].length + 1;
        }

        try {
            _hyperscript.parse(hsSource);
        } catch (e) {
            var msg = e.message.split("\n")[0];
            errors.push({
                from: CodeMirror.Pos(startLine, startCol),
                to: CodeMirror.Pos(startLine, startCol + hsSource.length),
                message: msg,
                severity: "error"
            });
        }
    }
    return errors;
}

CodeMirror.registerHelper("lint", "html-hyperscript", lintHyperscript);

// ============================================================
// Autocomplete
// ============================================================
function hsHint(cm) {
    var cursor = cm.getCursor();
    var line = cm.getLine(cursor.line);
    var end = cursor.ch;
    var start = end;
    while (start > 0 && /[\w$:^@]/.test(line.charAt(start - 1))) start--;
    var word = line.slice(start, end).toLowerCase();

    var before = line.slice(0, start);
    if (!/_\s*=\s*"/.test(before) && !/_\s*=\s*'/.test(before)) return null;

    var completions = HS_KEYWORDS.filter(function (kw) {
        return kw.startsWith(word) && kw !== word;
    });
    if (completions.length === 0) return null;

    return {
        list: completions,
        from: CodeMirror.Pos(cursor.line, start),
        to: CodeMirror.Pos(cursor.line, end)
    };
}

CodeMirror.registerHelper("hint", "html-hyperscript", hsHint);

// ============================================================
// Editor
// ============================================================
var cm = CodeMirror.fromTextArea(document.getElementById('editor'), {
    mode: 'html-hyperscript',
    lineNumbers: true,
    tabSize: 2,
    indentWithTabs: false,
    lineWrapping: true,
    matchBrackets: true,
    gutters: ["CodeMirror-lint-markers"],
    lint: { getAnnotations: lintHyperscript, async: false },
    extraKeys: {
        'Ctrl-Enter': run,
        'Cmd-Enter': run,
        'Ctrl-Space': function (cm) { cm.showHint({ hint: hsHint }); },
    }
});

// ============================================================
// Load initial content: ?src= (LZ compressed) or default
// ============================================================
var params = new URLSearchParams(window.location.search);
var sharedSrc = params.get('src');
if (sharedSrc) {
    try {
        cm.setValue(LZString.decompressFromEncodedURIComponent(sharedSrc));
    } catch (e) {
        cm.setValue(BUILTIN_EXAMPLES.counter);
    }
} else {
    cm.setValue(BUILTIN_EXAMPLES.counter);
}

// ============================================================
// Preview
// ============================================================
var scriptPath = '/js/_hyperscript.min.js';
var lastErrors = [];

function run() {
    var html = cm.getValue();
    var iframe = document.getElementById('preview');
    lastErrors = [];

    var doc = iframe.contentDocument;
    doc.open();
    doc.write(
        '<!doctype html><html><head><meta charset="utf-8">' +
        '<style>body{font-family:"IBM Plex Sans",-apple-system,system-ui,sans-serif;padding:16px;font-size:15px;}button{cursor:pointer;}</style>' +
        '<script src="' + scriptPath + '"><\/script>' +
        '<script>\n' +
        'window.addEventListener("error", function(e) { parent._playgroundError(e.message); });\n' +
        'var _origErr = console.error;\n' +
        'console.error = function() {\n' +
        '  var msg = Array.from(arguments).map(function(a) { return typeof a === "string" ? a : ""; }).join(" ");\n' +
        '  if (msg) parent._playgroundError(msg);\n' +
        '  _origErr.apply(console, arguments);\n' +
        '};\n' +
        '<\/script>' +
        '</head><body>' +
        html +
        '</body></html>'
    );
    doc.close();

    setTimeout(function () {
        var status = document.getElementById('status');
        if (lastErrors.length > 0) {
            status.innerHTML = '<span class="error">' + lastErrors.length + ' error(s): ' +
                lastErrors.map(function(e) { return e.split("\n")[0]; }).join(" | ") + '</span>';
        } else {
            status.innerHTML = 'Updated <span style="opacity:0.5">(' + new Date().toLocaleTimeString() + ')</span>';
        }
    }, 200);
}

window._playgroundError = function (msg) {
    lastErrors.push(msg);
};

// ============================================================
// Controls
// ============================================================
document.getElementById('run-btn').addEventListener('click', run);

document.getElementById('clear-btn').addEventListener('click', function () {
    cm.setValue('');
    var doc = document.getElementById('preview').contentDocument;
    doc.open();
    doc.write('<!doctype html><html><body></body></html>');
    doc.close();
    document.getElementById('status').textContent = 'Cleared';
});

document.getElementById('share-btn').addEventListener('click', function () {
    var compressed = LZString.compressToEncodedURIComponent(cm.getValue());
    var url = window.location.origin + window.location.pathname + '?src=' + compressed;
    navigator.clipboard.writeText(url).then(function () {
        document.getElementById('status').textContent = 'Share URL copied to clipboard!';
    });
});

document.getElementById('examples').addEventListener('change', function () {
    var val = this.value;
    if (!val) return;
    this.value = '';

    if (BUILTIN_EXAMPLES[val]) {
        cm.setValue(BUILTIN_EXAMPLES[val]);
        run();
        return;
    }

    // Fetch from /playground/ directory
    fetch('/playground/' + val)
        .then(function (r) { return r.text(); })
        .then(function (text) {
            cm.setValue(text);
            run();
        })
        .catch(function () {
            document.getElementById('status').innerHTML = '<span class="error">Failed to load example</span>';
        });
});

// Initial run
setTimeout(run, 100);
</script>
