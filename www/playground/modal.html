<button _="on click open #modal" class="btn">Open Modal</button>

<dialog id="modal">
    <div class="modal-header">
        <h3>Contact Info</h3>
        <button _="on click close #modal">&times;</button>
    </div>
    <input autofocus type="text" placeholder="First Name">
    <input type="text" placeholder="Last Name">
    <a href="#">some link</a>
    <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed bibendum a tellus et hendrerit.
       Nam lacinia ex non iaculis blandit. Vestibulum ante ipsum primis in faucibus orci luctus et
       ultrices posuere cubilia curae.</p>
</dialog>

<style>
    #modal {
        border: 1px solid #ccc; border-radius: 8px; padding: 1.5rem; max-width: 28rem; width: 100%;
        &::backdrop { background: rgba(0,0,0,0.4); }
        & .modal-header {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;
            & h3 { margin: 0; }
            & button { background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666; }
        }
        & input { display: block; width: 100%; padding: 8px; font-size: 1rem; margin-bottom: 0.75rem; box-sizing: border-box; }
        & a { display: block; margin-bottom: 0.75rem; }
        & p { color: #555; line-height: 1.5; }
    }
</style>
