name: Deploy website

on:
  push:
    branches: [master]
    paths: [www/**, src/skills/**]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Sync llms-full.txt from skills file
        run: cp src/skills/EFFECTIVE_HYPERSCRIPT.md www/llms-full.txt

      - name: Build site
        working-directory: www
        run: |
          rm -rf _site
          npx @11ty/eleventy --input=. --output=_site

      - uses: actions/upload-pages-artifact@v3
        with:
          path: www/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
